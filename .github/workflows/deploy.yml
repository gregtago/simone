name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Droits nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci déclenche le postinstall qui vendorise les assets OCR
      # (cœur WASM + données de langue) pour un fonctionnement hors-ligne.
      - name: Installer les dépendances
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Publier l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
